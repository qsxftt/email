<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Выбор пользователя</title>
    <style>
        :root {
            --bg: #f4f6fb;
            --panel: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --accent: #1d4ed8;
            --accent-soft: #dbeafe;
            --border: #d9e2f1;
            --shadow: 0 18px 40px rgba(30, 41, 59, 0.10);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, sans-serif;
            background: linear-gradient(180deg, #eef4ff 0%, var(--bg) 100%);
            color: var(--text);
        }

        .page {
            max-width: 960px;
            margin: 0 auto;
            padding: 24px;
        }

        .header,
        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 22px;
            box-shadow: var(--shadow);
        }

        .header {
            padding: 20px 24px;
            margin-bottom: 28px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        .brand {
            font-size: 22px;
            font-weight: 700;
        }

        .nav {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .nav a {
            text-decoration: none;
            color: var(--text);
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 10px 16px;
            font-weight: 600;
        }

        .nav a.active {
            background: var(--accent);
            color: #ffffff;
            border-color: var(--accent);
        }

        .panel {
            max-width: 560px;
            margin: 0 auto;
            padding: 32px;
        }

        h1 {
            margin: 0 0 10px;
            font-size: 32px;
        }

        p {
            margin: 0 0 24px;
            color: var(--muted);
            line-height: 1.6;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 10px;
        }

        select {
            width: 100%;
            padding: 14px 16px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: #f8fafc;
            font-size: 16px;
            margin-bottom: 18px;
        }

        button {
            border: none;
            border-radius: 16px;
            padding: 14px 18px;
            font-size: 16px;
            font-weight: 700;
            background: var(--accent);
            color: #ffffff;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="page">
        <header class="header">
            <div class="topbar">
                <div class="brand">EmailBox</div>
            </div>

            <nav class="nav">
                <a href="{% url 'inbox' %}">Входящие</a>
                <a href="{% url 'sent' %}">Исходящие</a>
                <a href="{% url 'archive' %}">Архив</a>
                <a href="{% url 'trash' %}">Корзина</a>
                <a href="{% url 'select_user' %}" >Сменить пользователя</a>
                <a href="{% url 'send_email' %}">Написать письмо</a>
            </nav>
        </header>

        <section class="panel">
            <h1>Выбор пользователя</h1>
            <p>Выбери активного пользователя, чтобы открыть его почтовый ящик и работать от его имени.</p>

            <form method="post">
                {% csrf_token %}
                <label for="user_id">Пользователь</label>
                <select name="user_id">
                    {% for user in users %}
                        <option value="{{ user.id }}">{{ user.email }}</option>
                    {% endfor %}
                </select>
                <button type="submit">Выбрать</button>
            </form>
        </section>
    </div>
</body>
</html>
