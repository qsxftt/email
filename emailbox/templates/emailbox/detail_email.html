<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Просмотр письма</title>
    <style>
        :root {
            --bg: #f4f6fb;
            --panel: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --accent: #1d4ed8;
            --border: #d9e2f1;
            --shadow: 0 18px 40px rgba(30, 41, 59, 0.10);
            --soft: #eef3ff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, sans-serif;
            background: linear-gradient(180deg, #eef4ff 0%, var(--bg) 100%);
            color: var(--text);
        }

        .page {
            max-width: 1040px;
            margin: 0 auto;
            padding: 24px;
        }

        .header,
        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 22px;
            box-shadow: var(--shadow);
        }

        .header {
            padding: 20px 24px;
            margin-bottom: 28px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        .brand {
            font-size: 22px;
            font-weight: 700;
        }

        .current-user {
            color: var(--muted);
            font-size: 14px;
        }

        .nav {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .nav a {
            text-decoration: none;
            color: var(--text);
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 10px 16px;
            font-weight: 600;
        }

        .nav a.active {
            background: var(--accent);
            color: #ffffff;
            border-color: var(--accent);
        }

        .panel {
            padding: 32px;
        }

        .subject {
            margin: 0 0 18px;
            font-size: 34px;
            line-height: 1.2;
        }

        .meta-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 14px;
            margin-bottom: 24px;
        }

        .meta-card {
            background: var(--soft);
            border-radius: 18px;
            padding: 16px;
        }

        .meta-label {
            display: block;
            color: var(--muted);
            font-size: 13px;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .meta-value {
            font-size: 16px;
            font-weight: 600;
        }

        .message-box {
            border: 1px solid var(--border);
            border-radius: 20px;
            background: #fbfdff;
            padding: 24px;
            line-height: 1.8;
            white-space: pre-wrap;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 24px;
        }

        .actions a,
        .actions button {
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px 16px;
            background: #ffffff;
            color: var(--text);
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
        }

        .actions .primary {
            background: var(--accent);
            color: #ffffff;
            border-color: var(--accent);
        }

        .actions .danger {
            background: #fff1f2;
            border-color: #fecdd3;
            color: #be123c;
        }

        .inline-form {
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="page">
        <header class="header">
            <div class="topbar">
                <div class="brand">EmailBox</div>
                <div class="current-user">
                    Текущий пользователь: {{ user.email}}
                </div>
            </div>

            <nav class="nav">
                <a href="{% url 'inbox' %}">Входящие</a>
                <a href="{% url 'sent' %}">Исходящие</a>
                <a href="{% url 'archive' %}">Архив</a>
                <a href="{% url 'trash' %}">Корзина</a>
                <a href="{% url 'select_user' %}">Сменить пользователя</a>
                <a href="{% url 'send_email' %}">Написать письмо</a>
            </nav>
        </header>

        <section class="panel">
            <h1 class="subject">{{ email.topic}}</h1>

            <div class="meta-grid">
                <div class="meta-card">
                    <span class="meta-label">Отправитель</span>
                    <div class="meta-value">{{ email.sender}}</div>
                </div>

                <div class="meta-card">
                    <span class="meta-label">Получатель</span>
                    <div class="meta-value">{{ email.recipient}}</div>
                </div>

                <div class="meta-card">
                    <span class="meta-label">Дата</span>
                    <div class="meta-value">{{ email.sent_at}}</div>
                </div>
            </div>

            <div class="message-box">
                {{ email.text }}
            </div>

            <div class="actions">
                <form method="post" class="inline-form">
                    {% csrf_token %}
                    {% if status %}
                        <button type="submit" name="action" value="return">Вернуть</button>
                    {% else %}
                        <button type="submit" name="action" value="archive">В архив</button>
                        <button type="submit" name="action" value="trash">В корзину</button>
                    {% endif %}
                    <button type="submit" class="danger" name="action" value="delete">Удалить</button>
                </form>
            </div>
        </section>
    </div>
</body>
</html>
