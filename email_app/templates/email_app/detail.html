{% extends 'email_app/base.html' %}

{% block title %}{{ email.subject }}{% endblock %}

{% block content %}
<h2>{{ email.subject }}</h2>
<p><strong>От:</strong> {{ email.sender_email }}</p>
<p><strong>Кому:</strong> {{ email.recipient_email }}</p>
<p><strong>Дата:</strong> {{ email.sent_at|date:"d.m.Y H:i" }}</p>
<hr>
<p>{{ email.body|linebreaksbr }}</p>
<hr>
<a href="{% url 'inbox' %}">← Назад</a>
{% endblock %}
