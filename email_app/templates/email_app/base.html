<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Почта{% endblock %}</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        nav a { margin-right: 15px; text-decoration: none; color: #333; }
        nav a:hover { text-decoration: underline; }
        .container { max-width: 800px; margin: auto; }
        .email-list { list-style: none; padding: 0; }
        .email-list li { padding: 10px; border-bottom: 1px solid #ccc; }
        .email-list li.unread { font-weight: bold; background: #f9f9f9; }
        .email-list a { text-decoration: none; color: #000; display: block; }
        .email-list a:hover { background: #f0f0f0; }
        .btn { padding: 5px 10px; background: #007bff; color: white; border: none; cursor: pointer; }
        .btn-danger { background: #dc3545; }
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'inbox' %}">Входящие</a>
        <a href="{% url 'sent' %}">Отправленные</a>
        <a href="{% url 'archive' %}">Архив</a>
        <a href="{% url 'trash' %}">Корзина</a>
        <a href="{% url 'compose' %}">Написать письмо</a>
        {% if user.is_authenticated %}
            <span style="float:right;">
                {{ user.username }} | 
                <form method="post" action="{% url 'logout' %}?next={% url 'inbox' %}" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" style="background:none; border:none; color:blue; text-decoration:underline; cursor:pointer;">Выйти</button>
                </form>
            </span>
        {% else %}
            <span style="float:right;"><a href="{% url 'login' %}">Войти</a></span>
        {% endif %}
    </nav>
    <hr>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
