{% extends 'email_app/base.html' %}

{% block title %}Новое письмо{% endblock %}

{% block content %}
<h1>Написать письмо</h1>
{% if error %}
    <p style="color:red;">{{ error }}</p>
{% endif %}
<form method="post">
    {% csrf_token %}
    <p>
        <label>Кому (имя пользователя):</label><br>
        <select name="recipient" required>
            <option value="">-- выберите --</option>
            {% for u in users %}
                <option value="{{ u.username }}">{{ u.username }}</option>
            {% endfor %}
        </select>
    </p>
    <p>
        <label>Тема:</label><br>
        <input type="text" name="subject" maxlength="255" required>
    </p>
    <p>
        <label>Текст письма:</label><br>
        <textarea name="body" rows="10" cols="50" required></textarea>
    </p>
    <button type="submit" class="btn">Отправить</button>
</form>
{% endblock %}
